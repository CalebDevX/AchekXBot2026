services:
  - type: web
    name: AchekXBot
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install --legacy-peer-deps
    startCommand: node index.js
    envVars:
      - key: SESSION
        sync: false          # User must set this manually in the Render dashboard
      - key: DATABASE_URL
        value: ./bot.db      # Uses local SQLite by default (free)
      - key: BOT_NAME
        value: AchekBot
      - key: MODE
        value: private
      - key: HANDLERS
        value: ".,/"
      - key: REJECT_CALL
        value: "true"
      - key: CMD_REACTION
        value: "true"
      - key: DISABLE_START_MESSAGE
        value: "true"
      - key: PORT
        value: "5000"
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Africa/Lagos
    disk:
      name: sessions
      mountPath: /app/sessions
      sizeGB: 1
